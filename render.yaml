services:
  - type: web
    name: destino-gig-agent
    runtime: python
    rootDir: agente-gigs
    buildCommand: python -m unittest -v
    startCommand: python service.py
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5
      - key: APP_API_KEY
        generateValue: true
